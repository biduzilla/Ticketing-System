spring:
  application:
    name: inventoryservice

  datasource:
    url: jdbc:mysql://localhost:3306/ticketing
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: none

server:
  port: 8080

logging:
  level:
    root: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs